[options]
; إعدادات المدير
admin_passwd = ${ADMIN_PASSWORD:-admin}

; إعدادات أساسية للسحابة
proxy_mode = True
without_demo = True
list_db = False

; إعدادات المسارات (مهمة جداً!)
addons_path = /odoo/addons,/odoo/odoo/addons

; إعدادات قاعدة البيانات (سيتم تعبئتها من Render)
db_host = ${DB_HOST:-db}
db_port = ${DB_PORT:-5432}
db_user = ${DB_USER:-odoo}
db_password = ${DB_PASSWORD:-odoo}
db_name = ${DB_NAME:-postgres}
db_maxconn = 64

; إعدادات الملفات والسجلات
data_dir = /var/lib/odoo
logfile = /odoo/odoo.log

; إعدادات الأداء
max_cron_threads = 2

; إعدادات إضافية
http_interface = 0.0.0.0
http_port = 8069
longpolling_port = 8072
workers = 2
limit_memory_soft = 1073741824
limit_memory_hard = 2684354560
